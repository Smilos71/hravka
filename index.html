<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://smix-video.vercel.app/icon.ico" type="image/x-icon">
    <title>Hravka | Select Version</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-orange: #ff6600;
            --bg-dark: #0b0d10;
            --card-bg: #16191e;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 102, 0, 0.08) 0%, transparent 70%);
            overflow: hidden;
        }

        .selection-container {
            text-align: center;
            max-width: 500px;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-main {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            /* Rámeček i stín jsou pryč */
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 16px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 22px 30px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .choice-btn:hover {
            border-color: var(--primary-orange);
            background: rgba(255, 102, 0, 0.03);
            transform: translateY(-2px);
        }

        .choice-btn.featured {
            border-color: var(--primary-orange);
            background: rgba(255, 102, 0, 0.05);
        }

        .tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            background: var(--primary-orange);
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            margin-left: 10px;
            letter-spacing: 0.5px;
        }

        .choice-btn svg {
            opacity: 0.3;
            transition: 0.3s;
        }

        .choice-btn:hover svg {
            opacity: 1;
            transform: translateX(4px);
            color: var(--primary-orange);
        }
    </style>
</head>
<body>

    <div class="selection-container">
        <img src="https://smix-video.vercel.app/icon.ico" alt="Hravka Logo" class="logo-main">
        <h1>Where to play?</h1>
        <p>Choose your preferred Hravka version</p>

        <div class="options">
            <a href="index.html" class="choice-btn featured">
                <div>New Hravka <span class="tag">BETA</span></div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </a>

            <a href="https://hravka.vercel.app/legacy.html" class="choice-btn">
                <div>Hravka Legacy</div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </a>
        </div>
    </div>

</body>
</html>
