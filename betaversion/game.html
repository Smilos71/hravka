<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="https://smix-video.vercel.app/icon.ico" type="image/x-icon">
    <title>Hravka | Game</title>
    
    <script src="https://hravka.vercel.app/data.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-orange: #ff6600;
            --bg-dark: #0f1115;
            --card-bg: #1a1d24;
            --text-light: #ffffff;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 102, 0, 0.05) 0%, transparent 50%);
            min-height: 100vh;
        }

        header {
            padding: 15px 5%;
            background: rgba(15, 17, 21, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .btn-icon {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            margin-right: 20px;
        }

        .btn-icon:hover { background: var(--primary-orange); border-color: var(--primary-orange); }

        .logo-text { font-size: 22px; font-weight: 800; color: white; text-decoration: none; }
        .logo-text span { color: var(--primary-orange); }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }

        .game-wrapper {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .game-frame-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; display: none; }

        .play-overlay {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .play-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
        }

        .play-btn {
            position: relative;
            z-index: 11;
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 102, 0, 0.4); }

        .game-bar {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
        }

        .game-meta { display: flex; align-items: center; gap: 15px; }
        .game-meta img { width: 45px; height: 45px; border-radius: 10px; }
        .game-meta h2 { font-size: 18px; font-weight: 700; }

        .recommended { margin-top: 40px; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text-dim); }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .mini-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px;
            text-decoration: none;
            color: white;
            border: 1px solid var(--border);
            transition: 0.3s;
            text-align: center;
        }

        .mini-card:hover { border-color: var(--primary-orange); transform: translateY(-3px); }
        .mini-card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; margin-bottom: 5px; }
        .mini-card span { font-size: 12px; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .desc-box { padding: 25px; border-top: 1px solid var(--border); color: var(--text-dim); line-height: 1.5; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <a href="index.html" class="logo-text">HRAV<span>KA</span></a>
    </header>

    <div class="container" id="main-content" style="display:none;">
        <div class="game-wrapper">
            <div class="game-frame-container">
                <div class="play-overlay" id="overlay">
                    <button class="play-btn" onclick="startGame()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        PLAY NOW
                    </button>
                </div>
                <iframe id="game-iframe" src="" allowfullscreen></iframe>
            </div>
            
            <div class="game-bar">
                <div class="game-meta">
                    <img id="game-icon" src="">
                    <h2 id="game-title">Game Title</h2>
                </div>
                <button class="btn-icon" onclick="toggleFullscreen()" style="margin:0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
            </div>

            <div class="desc-box" id="game-desc"></div>
        </div>

        <div class="recommended">
            <h2 class="section-title">Recommended for you</h2>
            <div class="game-grid" id="recommended-grid"></div>
        </div>
    </div>

    <script>
        // Spustit okamžitě po načtení DOMu
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof games !== 'undefined') {
                init();
            } else {
                // Pokud data.js ještě nedorazil, počkáme sekundu
                setTimeout(init, 500);
            }
        });

        function init() {
            const id = new URLSearchParams(window.location.search).get("id");
            const game = games.find(g => g.id === id);

            if (!game) {
                document.body.innerHTML = '<div style="text-align:center; padding:100px;">Game not found. <a href="index.html" style="color:orange;">Back Home</a></div>';
                return;
            }

            // Naplnění dat
            document.title = game.name + " - Hravka";
            document.getElementById('game-title').innerText = game.name;
            document.getElementById('game-icon').src = game.icon;
            document.getElementById('game-desc').innerText = game.description || "Enjoy this epic game on Hravka.";
            document.getElementById('overlay').style.backgroundImage = `url('${game.icon}')`;
            document.getElementById('game-iframe').src = game.url;
            
            // Zobrazení obsahu
            document.getElementById('main-content').style.display = 'block';

            // Doporučené hry
            const grid = document.getElementById('recommended-grid');
            games.filter(g => g.id !== id).sort(() => 0.5 - Math.random()).slice(0, 6).forEach(g => {
                grid.innerHTML += `
                    <a href="game.html?id=${g.id}" class="mini-card">
                        <img src="${g.icon}">
                        <span>${g.name}</span>
                    </a>`;
            });
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-iframe').style.display = 'block';
        }

        function toggleFullscreen() {
            const f = document.getElementById('game-iframe');
            if (f.requestFullscreen) f.requestFullscreen();
            else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
